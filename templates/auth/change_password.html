{% extends "base.html" %}

{% block title %}修改密码{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="{{ url_for('blog.index') }}">首页</a></li>
                <li class="breadcrumb-item"><a href="{{ url_for('auth.profile') }}">个人中心</a></li>
                <li class="breadcrumb-item active">修改密码</li>
            </ol>
        </nav>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="mb-3"><i class="bi bi-key me-2"></i>修改密码</h4>

                <form method="POST" action="{{ url_for('auth.change_password') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="old_password" class="form-label">原密码</label>
                        <input type="password"
                               class="form-control"
                               id="old_password"
                               name="old_password"
                               required
                               autocomplete="current-password">
                    </div>

                    <div class="mb-3">
                        <label for="new_password" class="form-label">新密码</label>
                        <input type="password"
                               class="form-control"
                               id="new_password"
                               name="new_password"
                               minlength="6"
                               required
                               autocomplete="new-password">
                        <div class="form-text">至少 6 位</div>
                    </div>

                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">确认新密码</label>
                        <input type="password"
                               class="form-control"
                               id="confirm_password"
                               name="confirm_password"
                               minlength="6"
                               required
                               autocomplete="new-password">
                    </div>

                    <div class="alert alert-warning small">
                        <i class="bi bi-exclamation-triangle me-1"></i>
                        修改成功后需要重新登录
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('auth.profile') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg me-1"></i>取消
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-1"></i>提交
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
