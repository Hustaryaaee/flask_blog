{% extends "base.html" %}

{% block title %}注册{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm mt-4">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus display-4 text-primary"></i>
                    <h3 class="mt-2 mb-0">创建账号</h3>
                    <p class="text-muted small mb-0">加入我们, 开始记录你的故事</p>
                </div>

                <form method="POST" action="{{ url_for('auth.register') }}" class="needs-validation" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="username" class="form-label">用户名 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text"
                                   class="form-control"
                                   id="username"
                                   name="username"
                                   value="{{ username or '' }}"
                                   placeholder="2-30 字符, 仅字母/数字/_-"
                                   minlength="2" maxlength="30"
                                   pattern="[A-Za-z0-9_\-]{2,30}"
                                   autocomplete="username"
                                   required>
                        </div>
                        <div class="form-text">首字母建议使用字母, 便于生成头像</div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">邮箱 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email"
                                   class="form-control"
                                   id="email"
                                   name="email"
                                   value="{{ email or '' }}"
                                   placeholder="your@email.com"
                                   maxlength="120"
                                   autocomplete="email"
                                   required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">密码 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password"
                                       class="form-control"
                                       id="password"
                                       name="password"
                                       placeholder="至少 6 位"
                                       minlength="6"
                                       autocomplete="new-password"
                                       required>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="confirm_password" class="form-label">确认密码 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                <input type="password"
                                       class="form-control"
                                       id="confirm_password"
                                       name="confirm_password"
                                       placeholder="再输入一次"
                                       minlength="6"
                                       autocomplete="new-password"
                                       required>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-circle me-1"></i>注册并登录
                    </button>

                    <div class="text-center mt-3 small">
                        已有账号? <a href="{{ url_for('auth.login') }}">直接登录</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
