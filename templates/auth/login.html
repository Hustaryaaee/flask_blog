{% extends "base.html" %}

{% block title %}登录{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm mt-4">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-person-circle display-4 text-primary"></i>
                    <h3 class="mt-2 mb-0">欢迎回来</h3>
                    <p class="text-muted small mb-0">登录后即可写文章、评论</p>
                </div>

                <form method="POST" action="{{ url_for('auth.login') }}" class="needs-validation" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}">{% endif %}

                    <div class="mb-3">
                        <label for="identifier" class="form-label">用户名 / 邮箱</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text"
                                   class="form-control"
                                   id="identifier"
                                   name="identifier"
                                   value="{{ identifier or '' }}"
                                   placeholder="请输入用户名或邮箱"
                                   autocomplete="username"
                                   required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password"
                                   class="form-control"
                                   id="password"
                                   name="password"
                                   placeholder="请输入密码"
                                   autocomplete="current-password"
                                   required>
                        </div>
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="remember" name="remember" value="1">
                        <label class="form-check-label" for="remember">记住我</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i>登录
                    </button>

                    <div class="text-center mt-3 small">
                        还没有账号? <a href="{{ url_for('auth.register') }}">立即注册</a>
                    </div>
                </form>
            </div>
        </div>
        <p class="text-center text-muted small mt-3">
            <i class="bi bi-shield-lock me-1"></i>本站采用 CSRF 保护与密码哈希存储
        </p>
    </div>
</div>
{% endblock %}
